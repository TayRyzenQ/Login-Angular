<div class="contact-container">
  <h2>Correo</h2>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">What's your name?</label>
      <input id="name" type="text" formControlName="name" placeholder="Your Name" />
      <div class="error" *ngIf="contactForm.controls.name.invalid && contactForm.controls.name.touched">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="you@email.com" />
      <div class="error" *ngIf="contactForm.controls.email.invalid && contactForm.controls.email.touched">
        Valid email is required.
      </div>
    </div>

    <div class="form-group">
      <label for="message">Your message</label>
      <textarea id="message" rows="4" formControlName="message" placeholder="Write your message here"></textarea>
      <div class="error" *ngIf="contactForm.controls.message.invalid && contactForm.controls.message.touched">
        Message is required.
      </div>
    </div>

    <button type="submit" [disabled]="contactForm.invalid">
      Send your message
    </button>
  </form>
</div>
