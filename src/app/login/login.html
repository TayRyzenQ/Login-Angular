<div class="login-container">
  <div class="login-card">
    <h2>¡Bienvenido!</h2>
    <input type="text" placeholder="Correo electrónico o usuario" [(ngModel)]="userInput" />

    <input type="password" placeholder="Contraseña" [(ngModel)]="password" />

    <button class="btn-login" (click)="loginTradicional()">
      Iniciar sesión
    </button>

    <div class="divider">o inicia sesión con Google</div>

    <div id="googleButton"></div>
  </div>
</div>
